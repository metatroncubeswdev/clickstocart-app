name: clicks_to_cart
description: "ClicksToCart mobile application"
publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/icons/c2c_app_icon.png
    - assets/icons/c2c.png
    - assets/icons/cart_logo.png
    - assets/icons/cart_transp.png
    - assets/splash/splash_text.png
    - assets/splash/splash_logo.png
    - assets/icons/clickstocart_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/c2c_app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/c2c_app_icon.png"

flutter_native_splash:
  android: true
  ios: true
  fullscreen: true   
  color: "#FFFFFF"
  color_dark: "#FFFFFF" # FORCE white even in dark mode

  image: assets/splash/splash_logo.png
  image_dark: assets/splash/splash_logo.png   # same image for dark mode

  android_gravity: center
  ios_content_mode: center

  # Disable dark mode handling on Android 12+
  android_12:
    image: assets/splash/splash_logo.png
    image_dark: assets/splash/splash_logo.png
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
    icon_background_color: "#FFFFFF"
